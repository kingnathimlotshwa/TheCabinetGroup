# ============================================================
#  TheCabinetGroup — Publish & Release Workflow
#
#  Trigger:
#    git tag v1.0.0 && git push origin v1.0.0
#
#  What it does:
#    • Builds Windows / Linux / macOS self-contained executables
#    • Builds a signed Android APK
#    • Publishes WASM to GitHub Pages
#    • Creates a GitHub Release with all desktop + Android binaries attached
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#  ─────────────────────────────────────────────────────────
#  APPWRITE_PROJECT_ID      Your Appwrite project ID
#  APPWRITE_DATABASE_ID     Your Appwrite database ID
#  APPWRITE_BUCKET_ID       Your Appwrite storage bucket ID
#
#  Android signing:
#  ANDROID_KEYSTORE_BASE64  base64 -w 0 release.jks
#  ANDROID_KEYSTORE_PASS    Keystore password
#  ANDROID_KEY_ALIAS        Key alias (e.g. thecabinetgroup)
#  ANDROID_KEY_PASS         Key password
# ============================================================

name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ──────────────────────────────────────────────────────────
  #  DESKTOP  (Windows · Linux · macOS)
  # ──────────────────────────────────────────────────────────
  desktop:
    name: Desktop / ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-label: Windows
            rid: win-x64
            artifact: desktop-windows
            asset-name: TheCabinetGroup-windows-x64.zip
          - runner: ubuntu-latest
            os-label: Linux
            rid: linux-x64
            artifact: desktop-linux
            asset-name: TheCabinetGroup-linux-x64.zip
          - runner: macos-latest
            os-label: macOS
            rid: osx-x64
            artifact: desktop-macos
            asset-name: TheCabinetGroup-macos-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Write appsettings.json
        shell: bash
        run: |
          cat > TheCabinetGroup/Configurations/appsettings.json << EOF
          {
            "Appwrite": {
              "Endpoint": "https://cloud.appwrite.io/v1",
              "ProjectId": "${{ secrets.APPWRITE_PROJECT_ID }}",
              "DatabaseId": "${{ secrets.APPWRITE_DATABASE_ID }}",
              "BucketId":   "${{ secrets.APPWRITE_BUCKET_ID }}",
              "Collections": {
                "Members":       "members",
                "Contributions": "contributions",
                "Payments":      "payments",
                "Penalties":     "penalties",
                "Settings":      "stokvel_settings"
              }
            }
          }
          EOF

      - name: Publish
        shell: bash
        run: >
          dotnet publish TheCabinetGroup.Desktop/TheCabinetGroup.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version="${{ github.ref_name }}"
          -o publish/desktop

      - name: Zip output (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish/desktop
          zip -r ../../${{ matrix.asset-name }} .

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/desktop/* -DestinationPath ${{ matrix.asset-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset-name }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  ANDROID  (signed APK)
  # ──────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Write appsettings.json
        run: |
          cat > TheCabinetGroup/Configurations/appsettings.json << EOF
          {
            "Appwrite": {
              "Endpoint": "https://cloud.appwrite.io/v1",
              "ProjectId": "${{ secrets.APPWRITE_PROJECT_ID }}",
              "DatabaseId": "${{ secrets.APPWRITE_DATABASE_ID }}",
              "BucketId":   "${{ secrets.APPWRITE_BUCKET_ID }}",
              "Collections": {
                "Members":       "members",
                "Contributions": "contributions",
                "Payments":      "payments",
                "Penalties":     "penalties",
                "Settings":      "stokvel_settings"
              }
            }
          }
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Publish APK
        run: >
          dotnet publish TheCabinetGroup.Android/TheCabinetGroup.Android.csproj
          -c Release
          -p:ApplicationVersion=${{ github.run_number }}
          -p:ApplicationDisplayVersion="${{ github.ref_name }}"
          -p:AndroidSigningKeyStore=${{ github.workspace }}/release.jks
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASS }}
          -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASS }}
          -o publish/android

      - name: Rename APK with version
        run: |
          mv publish/android/*.apk \
             publish/android/TheCabinetGroup-${{ github.ref_name }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: publish/android/TheCabinetGroup-${{ github.ref_name }}.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  BROWSER  (WASM → GitHub Pages)
  # ──────────────────────────────────────────────────────────
  browser:
    name: Browser (WASM → GitHub Pages)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Write appsettings.json
        run: |
          cat > TheCabinetGroup/Configurations/appsettings.json << EOF
          {
            "Appwrite": {
              "Endpoint": "https://cloud.appwrite.io/v1",
              "ProjectId": "${{ secrets.APPWRITE_PROJECT_ID }}",
              "DatabaseId": "${{ secrets.APPWRITE_DATABASE_ID }}",
              "BucketId":   "${{ secrets.APPWRITE_BUCKET_ID }}",
              "Collections": {
                "Members":       "members",
                "Contributions": "contributions",
                "Payments":      "payments",
                "Penalties":     "penalties",
                "Settings":      "stokvel_settings"
              }
            }
          }
          EOF

      - name: Publish WASM
        run: >
          dotnet publish TheCabinetGroup.Browser/TheCabinetGroup.Browser.csproj
          -c Release
          -o publish/browser

      - name: Fix base href for GitHub Pages subfolder
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s|<base href=\"/\"|<base href=\"/${REPO_NAME}/\"|g" \
            publish/browser/wwwroot/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/browser/wwwroot

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ──────────────────────────────────────────────────────────
  #  RELEASE  (runs after all builds succeed)
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ desktop, android ]   # browser deploys to Pages independently

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: artifacts/desktop-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: artifacts/desktop-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: artifacts/desktop-macos

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "The Cabinet Group ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/desktop-windows/*.zip
            artifacts/desktop-linux/*.zip
            artifacts/desktop-macos/*.zip
            artifacts/android-apk/*.apk
          body: |
            ## Downloads
            | Platform | File |
            |---|---|
            | 🪟 Windows | `TheCabinetGroup-windows-x64.zip` |
            | 🐧 Linux   | `TheCabinetGroup-linux-x64.zip` |
            | 🍎 macOS   | `TheCabinetGroup-macos-x64.zip` |
            | 🤖 Android | `TheCabinetGroup-${{ github.ref_name }}.apk` |
            | 🌐 Browser | ${{ github.server_url }}/${{ github.repository }}/deployments |
