# ============================================================
#  TheCabinetGroup — Publish & Release Workflow
#
#  Triggers:
#    • Tag push:   git tag v1.0.0 && git push origin v1.0.0
#    • Manual:     Actions tab → "Publish" → Run workflow
#                  (enter version as "1.0.0" — no v prefix)
#
#  What it does:
#    • Builds Windows / Linux / macOS self-contained executables
#    • Builds a signed Android APK
#    • Publishes WASM to Netlify (handles COOP/COEP headers natively)
#    • Creates a GitHub Release with all desktop + Android binaries attached
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#  ─────────────────────────────────────────────────────────
#  APPWRITE_PROJECT_ID      Your Appwrite project ID
#  APPWRITE_DATABASE_ID     Your Appwrite database ID
#  APPWRITE_BUCKET_ID       Your Appwrite storage bucket ID
#
#  Android signing:
#  ANDROID_KEYSTORE_BASE64  base64 -w 0 release.jks
#  ANDROID_KEYSTORE_PASS    Keystore password
#  ANDROID_KEY_ALIAS        Key alias (e.g. thecabinetgroup)
#  ANDROID_KEY_PASS         Key password
#
#  Netlify:
#  NETLIFY_AUTH_TOKEN       User Settings → Applications → Personal access tokens
#  NETLIFY_SITE_ID          Site configuration → General → Site ID
# ============================================================

name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0 — no v prefix)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:

  # ──────────────────────────────────────────────────────────
  #  DESKTOP  (Windows · Linux · macOS)
  # ──────────────────────────────────────────────────────────
  desktop:
    name: Desktop / ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-label: Windows
            rid: win-x64
            artifact: desktop-windows
            asset-name: TheCabinetGroup-windows-x64.zip
          - runner: ubuntu-latest
            os-label: Linux
            rid: linux-x64
            artifact: desktop-linux
            asset-name: TheCabinetGroup-linux-x64.zip
          - runner: macos-latest
            os-label: macOS
            rid: osx-x64
            artifact: desktop-macos
            asset-name: TheCabinetGroup-macos-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Write appsettings.json
        shell: bash
        run: |
          cat > TheCabinetGroup/Configurations/appsettings.json << EOF
          {
            "Appwrite": {
              "Endpoint": "https://cloud.appwrite.io/v1",
              "ProjectId": "${{ secrets.APPWRITE_PROJECT_ID }}",
              "DatabaseId": "${{ secrets.APPWRITE_DATABASE_ID }}",
              "BucketId":   "${{ secrets.APPWRITE_BUCKET_ID }}",
              "Collections": {
                "Members":       "members",
                "Contributions": "contributions",
                "Payments":      "payments",
                "Penalties":     "penalties",
                "Settings":      "stokvel_settings"
              }
            }
          }
          EOF

      - name: Publish
        shell: bash
        run: >
          dotnet publish TheCabinetGroup.Desktop/TheCabinetGroup.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version="${{ steps.version.outputs.value }}"
          -o publish/desktop

      - name: Zip output (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish/desktop
          zip -r ../../${{ matrix.asset-name }} .

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/desktop/* -DestinationPath ${{ matrix.asset-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset-name }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  ANDROID  (signed APK)
  # ──────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Write appsettings.json
        run: |
          cat > TheCabinetGroup/Configurations/appsettings.json << EOF
          {
            "Appwrite": {
              "Endpoint": "https://cloud.appwrite.io/v1",
              "ProjectId": "${{ secrets.APPWRITE_PROJECT_ID }}",
              "DatabaseId": "${{ secrets.APPWRITE_DATABASE_ID }}",
              "BucketId":   "${{ secrets.APPWRITE_BUCKET_ID }}",
              "Collections": {
                "Members":       "members",
                "Contributions": "contributions",
                "Payments":      "payments",
                "Penalties":     "penalties",
                "Settings":      "stokvel_settings"
              }
            }
          }
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Publish APK
        run: >
          dotnet publish TheCabinetGroup.Android/TheCabinetGroup.Android.csproj
          -c Release
          -p:ApplicationVersion=${{ github.run_number }}
          -p:ApplicationDisplayVersion="${{ steps.version.outputs.value }}"
          -p:AndroidSigningKeyStore=${{ github.workspace }}/release.jks
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASS }}
          -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASS }}
          -o publish/android

      - name: Rename APK with version
        run: |
          # Find whatever APK dotnet produced and rename it consistently
          APK=$(find publish/android -name "*.apk" | head -1)
          mv "$APK" "publish/android/TheCabinetGroup-${{ steps.version.outputs.value }}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: publish/android/TheCabinetGroup-${{ steps.version.outputs.value }}.apk
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  #  RELEASE  (runs after all builds succeed)
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ desktop, android ]

    steps:
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "value=${VERSION}" >> $GITHUB_OUTPUT
          # Tag name includes v prefix for the release, strip for version number
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: artifacts/desktop-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: artifacts/desktop-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: artifacts/desktop-macos

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "The Cabinet Group ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/desktop-windows/*.zip
            artifacts/desktop-linux/*.zip
            artifacts/desktop-macos/*.zip
            artifacts/android-apk/*.apk
          body: |
            ## Downloads
            | Platform | File |
            |---|---|
            | 🪟 Windows | `TheCabinetGroup-windows-x64.zip` |
            | 🐧 Linux   | `TheCabinetGroup-linux-x64.zip` |
            | 🍎 macOS   | `TheCabinetGroup-macos-x64.zip` |
            | 🤖 Android | `TheCabinetGroup-${{ steps.version.outputs.value }}.apk` |
            | 🌐 Browser | See Netlify deployment |

  # ──────────────────────────────────────────────────────────
  #  BROWSER  (WASM → Netlify)
  #  Netlify sends COOP/COEP headers natively via _headers file
  #  so SkiaSharp threading works without a service worker hack.
  # ──────────────────────────────────────────────────────────
  browser:
    name: Browser (WASM → Netlify)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools-net9

      - name: Write appsettings.json
        run: |
          cat > TheCabinetGroup/Configurations/appsettings.json << EOF
          {
            "Appwrite": {
              "Endpoint": "https://cloud.appwrite.io/v1",
              "ProjectId": "${{ secrets.APPWRITE_PROJECT_ID }}",
              "DatabaseId": "${{ secrets.APPWRITE_DATABASE_ID }}",
              "BucketId":   "${{ secrets.APPWRITE_BUCKET_ID }}",
              "Collections": {
                "Members":       "members",
                "Contributions": "contributions",
                "Payments":      "payments",
                "Penalties":     "penalties",
                "Settings":      "stokvel_settings"
              }
            }
          }
          EOF

      - name: Publish WASM
        run: >
          dotnet publish TheCabinetGroup.Browser/TheCabinetGroup.Browser.csproj
          -c Release
          -o publish/browser

      - name: Write Netlify _headers file
        run: |
          cat > publish/browser/wwwroot/_headers << EOF
          /*
            Cross-Origin-Embedder-Policy: require-corp
            Cross-Origin-Opener-Policy: same-origin
          EOF

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: publish/browser/wwwroot
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Release ${{ github.ref_name }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
